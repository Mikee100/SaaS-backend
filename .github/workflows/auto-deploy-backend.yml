name: Auto Deploy Backend

on:
  workflow_run:
    workflows: ["Backend CI"]
    types: [completed]
    branches:
      - master
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: master

concurrency:
  group: backend-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: production
    env:
      PROD_HOST: 34.56.248.152
      PROD_USER: adeeraunitech
      PROD_PORT: "22"
      PROD_APP_DIR: /home/adeeraunitech/SaaS-backend
    steps:
      - name: Deploy to production server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.PROD_HOST }}
          username: ${{ env.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          passphrase: ${{ secrets.PROD_SSH_PASSPHRASE }}
          port: ${{ env.PROD_PORT }}
          script_stop: true
          command_timeout: 60m
          script: |
            set -e
            APP_DIR="${{ env.PROD_APP_DIR }}"
            BRANCH="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.branch || github.event.workflow_run.head_branch }}"

            if [ -z "$APP_DIR" ]; then
              echo "PROD_APP_DIR is not set"
              exit 1
            fi

            cd "$APP_DIR"
            git stash push --include-untracked --message "auto-deploy-stash-$(date +%s)" || true
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            chmod +x deploy.sh
            DEPLOY_BRANCH="$BRANCH" ./deploy.sh

  notify-success:
    needs: deploy
    if: success()
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      DEPLOY_NOTIFY_EMAIL_TO: ${{ secrets.DEPLOY_NOTIFY_EMAIL_TO }}
      DEPLOY_NOTIFY_EMAIL_FROM: ${{ secrets.DEPLOY_NOTIFY_EMAIL_FROM }}
    steps:
      - name: Send Slack success notification
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          payload=$(cat <<'JSON'
          {
            "text": "Backend production deploy succeeded.\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          JSON
          )
          curl -sS -X POST -H "Content-type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

      - name: Send email success notification
        if: env.SMTP_SERVER != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.DEPLOY_NOTIFY_EMAIL_TO != '' && env.DEPLOY_NOTIFY_EMAIL_FROM != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT != '' && env.SMTP_PORT || '587' }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "Backend deploy success - ${{ github.ref_name }}"
          to: ${{ env.DEPLOY_NOTIFY_EMAIL_TO }}
          from: ${{ env.DEPLOY_NOTIFY_EMAIL_FROM }}
          body: |
            Production deploy succeeded.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  notify-failure:
    needs: deploy
    if: failure()
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      DEPLOY_NOTIFY_EMAIL_TO: ${{ secrets.DEPLOY_NOTIFY_EMAIL_TO }}
      DEPLOY_NOTIFY_EMAIL_FROM: ${{ secrets.DEPLOY_NOTIFY_EMAIL_FROM }}
    steps:
      - name: Send Slack failure notification
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          payload=$(cat <<'JSON'
          {
            "text": "Backend production deploy failed.\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nCommit: ${{ github.sha }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          JSON
          )
          curl -sS -X POST -H "Content-type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"

      - name: Send email failure notification
        if: env.SMTP_SERVER != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' && env.DEPLOY_NOTIFY_EMAIL_TO != '' && env.DEPLOY_NOTIFY_EMAIL_FROM != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ env.SMTP_SERVER }}
          server_port: ${{ env.SMTP_PORT != '' && env.SMTP_PORT || '587' }}
          username: ${{ env.SMTP_USERNAME }}
          password: ${{ env.SMTP_PASSWORD }}
          subject: "Backend deploy failed - ${{ github.ref_name }}"
          to: ${{ env.DEPLOY_NOTIFY_EMAIL_TO }}
          from: ${{ env.DEPLOY_NOTIFY_EMAIL_FROM }}
          body: |
            Production deploy failed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Workflow Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
