name: Backend CI/CD (GCP)

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Linting
        run: npm run lint

      - name: Run Tests
        run: npm run test

      - name: Build Check
        run: npm run build

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Auth to GCP (Workload Identity Federation)
        if: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '' }}
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - name: Auth to GCP (Service Account Key)
        if: ${{ !(secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '') && secrets.GCP_SA_KEY != '' }}
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Validate GCP auth configuration
        if: ${{ !(secrets.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && secrets.GCP_SERVICE_ACCOUNT != '') && secrets.GCP_SA_KEY == '' }}
        run: |
          echo "Missing GCP auth configuration. Set either:"
          echo "1) GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT secrets, or"
          echo "2) GCP_SA_KEY secret"
          exit 1

      - name: 'SSH into GCE and Deploy'
        uses: 'google-github-actions/ssh-compute@v0'
        with:
          ssh_private_key: '${{ secrets.GCP_SSH_PRIVATE_KEY }}'
          instance_name: 'adeerabackend'
          zone: 'us-central1-c'
          project_id: 'project-d7c88bad-2fc2-4920-889'
          command: |
            cd ~/SaaS-backend
            git pull origin master
            npm install --production
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            pm2 reload SaaS-Backend --update-env
